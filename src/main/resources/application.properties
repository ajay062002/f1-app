# =========================
# Server
# =========================
server.port=1947

# =========================
# DataSource (MySQL)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/f1_portal?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# Flyway
# =========================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# =========================
# JWT (if used later)
# =========================
app.jwt.secret=change-this-to-a-very-long-random-secret-string
app.jwt.exp-min=120


# === Gmail SMTP (use your 16-char App Password) ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# From header used by services
app.mail.from=Aj F1 Live <your email>