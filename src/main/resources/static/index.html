<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aj F1 Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    :root{ --border:#242429; --muted:#9aa0a6; --accent:#e10600; --bg:#0b0d12;}
    body{background:#0b0d12;color:#e9edf4;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif}
    .bar{border-bottom:1px solid #1a1e26;background:linear-gradient(180deg,#121622,#0f141e)}
    .nav-wrap{max-width:1100px;margin:0 auto;padding:10px 14px;display:flex;gap:12px;align-items:center}
    .brand{margin:0;font-weight:900}
    .nav a{color:#cfd6e4;text-decoration:none;margin:0 8px}
    .nav a.active{color:#fff;font-weight:700}
    .container{max-width:1100px;margin:14px auto;padding:0 14px}
    .hero{margin-top:14px;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:#0f1014}
    .hero-banner{position:relative;height:320px;background:#0f0f12 center/cover no-repeat;display:grid;align-items:end}
    .hero-content{padding:16px;text-shadow:0 2px 14px rgba(0,0,0,.55)}
    .chip{padding:4px 10px;border-radius:999px;border:1px solid #ffffff22;background:rgba(255,255,255,.12);font-size:.9rem}
    .pill{background: rgba(255,255,255,.1); border:1px solid #ffffff2e; border-radius:12px; padding:6px 10px; text-align:center }
    .news-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px;margin:18px 0}
    .news-card{background:#101114;border:1px solid #242429;border-radius:12px;overflow:hidden}
    .news-thumb{width:100%;height:200px;object-fit:cover;background:#0f0f12;display:block}
    .news-body{padding:14px}
    #ai-fab{position:fixed;right:18px;bottom:18px;z-index:9999}
    #ai-btn{width:60px;height:60px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-weight:900;box-shadow:0 12px 28px rgba(0,0,0,.45);cursor:pointer}
    #ai-panel{position:fixed;right:18px;bottom:90px;width:360px;max-height:70vh;display:none;flex-direction:column;background:#0e1320;border:1px solid #2b2f3a;border-radius:16px;overflow:hidden;box-shadow:0 18px 40px rgba(0,0,0,.5)}
    #ai-head{background:linear-gradient(180deg,#1c2130,#171a25);border-bottom:1px solid #2b2f3a;padding:10px 12px;display:flex;align-items:center;gap:10px}
    #ai-head .led{width:10px;height:10px;border-radius:50%;background:var(--accent)}
    #ai-title{font-weight:900}
    #ai-tip{margin-left:auto;font-size:12px;color:#a9afba}
    #ai-chips{padding:8px 10px;display:flex;gap:8px;flex-wrap:wrap;background:#111727;border-bottom:1px solid #2b2f3a}
    .chipbtn{background:#1b2131;color:#d7dce6;border:1px solid #2b2f3a;padding:6px 10px;border-radius:999px;font-size:12px;cursor:pointer}
    .chipbtn:hover{background:#20283a}
    #ai-log{background:var(--bg);min-height:240px;max-height:48vh;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .msg{max-width:82%;padding:9px 11px;border-radius:12px;line-height:1.35;font-size:14px;white-space:pre-wrap}
    .msg.ai{background:#151a29;border:1px solid #2b2f3a;align-self:flex-start}
    .msg.user{background:#1f5bff;color:#fff;align-self:flex-end}
    #ai-bar{display:flex;gap:8px;padding:10px;background:#101627;border-top:1px solid #2b2f3a}
    #ai-input{flex:1;resize:none;height:48px;max-height:160px;padding:10px;border-radius:12px;border:1px solid #2b2f3a;background:#0e1220;color:#e9edf4}
    #ai-send{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:0 16px;font-weight:900;cursor:pointer}
    #ai-foot{padding:6px 10px;text-align:center;font-size:12px;color:#a9afba;background:#0d1220}
  </style>
</head>
<body>

<header class="bar">
  <div class="nav-wrap">
    <h1 class="brand">Aj F1 Live</h1>
    <nav class="nav">
      <a class="active" href="/index.html">Home</a>
      <a href="/drivers.html">Drivers</a>
      <a href="/teams.html">Teams</a>
      <a href="/standings.html">Standings</a>
      <a href="/circuits.html">Circuits</a>
      <a id="registerLink" href="/register.html">Register</a>
      <span id="welcome" style="margin-left:auto;margin-right:12px;"></span>
      <a id="authLink" href="/login.html">Login</a>
	  <a id="registerLink" href="/register.html">Register</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">☀️</button>
    </nav>
  </div>
</header>

<main class="container">
  <!-- HERO -->
  <section class="hero">
    <div id="heroBanner" class="hero-banner" data-race-utc="2025-09-15T13:00:00Z">
      <div class="hero-content">
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <h2 style="margin:0">Welcome<span id="hiUser"></span></h2>
          <span id="eventChip" class="chip">Italian GP</span>
          <span id="locChip" class="chip">Monza</span>
        </div>
        <div id="countWrap" style="display:flex;gap:8px;margin-top:8px;">
          <div class="pill"><strong id="cdD">00</strong><div>days</div></div>
          <div class="pill"><strong id="cdH">00</strong><div>hours</div></div>
          <div class="pill"><strong id="cdM">00</strong><div>mins</div></div>
          <div class="pill"><strong id="cdS">00</strong><div>secs</div></div>
        </div>
        <p id="localTime" class="mini" style="margin:.3rem 0 0 0"></p>
      </div>
    </div>
  </section>

  <!-- NEWS -->
  <section>
    <h3>Latest F1 news</h3>
    <div id="newsList" class="news-list">
      <article class="news-card"><img class="news-thumb" src="https://images.unsplash.com/photo-1511735111819-9a3f7709049c?q=80&w=1600&auto=format&fit=crop"><div class="news-body">Add your news source…</div></article>
      <article class="news-card"><img class="news-thumb" src="https://images.unsplash.com/photo-1518182170549-2bd2a7b0a98b?q=80&w=1600&auto=format&fit=crop"><div class="news-body">Add your news source…</div></article>
      <article class="news-card"><img class="news-thumb" src="https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?q=80&w=1600&auto=format&fit=crop"><div class="news-body">Add your news source…</div></article>
    </div>
  </section>
</main>

<!-- FLOATING CHATBOT -->
<div id="ai-fab">
  <button id="ai-btn" title="Open F1 assistant">AI</button>
  <div id="ai-panel" role="dialog" aria-label="F1 Assistant">
    <div id="ai-head">
      <span class="led"></span><span id="ai-title">F1 Assistant</span>
      <span id="ai-tip">Shift+Enter = newline</span>
    </div>
    <div id="ai-chips">
      <button class="chipbtn" data-q="drivers">Drivers</button>
      <button class="chipbtn" data-q="teams">Teams</button>
      <button class="chipbtn" data-q="What is DRS?">DRS</button>
      <button class="chipbtn" data-q="Qualifying rules">Qualifying</button>
      <button class="chipbtn" data-q="Sprint points">Sprint points</button>
      <button class="chipbtn" data-q="Ferrari stats">Ferrari stats</button>
      <button class="chipbtn" data-q="Stats for Charles Leclerc">Leclerc</button>
      <button class="chipbtn" data-q="Next race">Next race</button>
    </div>
    <div id="ai-log"></div>
    <div id="ai-bar">
      <textarea id="ai-input" placeholder="Ask anything about F1…"></textarea>
      <button id="ai-send">Send</button>
    </div>
    <div id="ai-foot">Powered by your backend • <code>/api/chat/ask</code></div>
  </div>
</div>

<script>
/* HERO background image */
document.getElementById('heroBanner').style.backgroundImage =
  'url("https://images.unsplash.com/photo-1504608524841-42fe6f032b4b?q=80&w=1600&auto=format&fit=crop")';

/* ===== Dynamic countdown from f1-data.json ===== */
const banner = document.getElementById('heroBanner');
let raceDate = new Date(banner.getAttribute('data-race-utc') || "2026-05-10T20:00:00Z").getTime();

// Fetch next race data dynamically
fetch('/data/f1-data.json')
  .then(r => r.json())
  .then(data => {
    const race = data.nextRace;
    if (!race) return;
    raceDate = new Date(race.startTimeUtc).getTime();
    document.getElementById('eventChip').textContent = race.grandPrix;
    document.getElementById('locChip').textContent = race.circuit;
    try {
      const fmt = new Intl.DateTimeFormat(undefined,{weekday:'short',year:'numeric',month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
      document.getElementById('localTime').textContent = "Local start: " + fmt.format(new Date(race.startTimeUtc));
    } catch(_) {}
  })
  .catch(() => {});
const cdD = document.getElementById('cdD');
const cdH = document.getElementById('cdH');
const cdM = document.getElementById('cdM');
const cdS = document.getElementById('cdS');
const localTime = document.getElementById('localTime');
const pad = n => n.toString().padStart(2,'0');
const plural = (n,s) => n===1?s:s+'s';
try {
  const fmt = new Intl.DateTimeFormat(undefined,{weekday:'short',year:'numeric',month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
  localTime.textContent = "Local start: " + fmt.format(new Date(raceUTC));
} catch(_) {}
function render(dist){
  if(dist<=0){ cdD.textContent="00";cdH.textContent="00";cdM.textContent="00";cdS.textContent="00";localTime.textContent="Race is live! 🏁"; return true; }
  const d=Math.floor(dist/86400000), h=Math.floor((dist%86400000)/3600000), m=Math.floor((dist%3600000)/60000), s=Math.floor((dist%60000)/1000);
  cdD.textContent=pad(d); cdH.textContent=pad(h); cdM.textContent=pad(m); cdS.textContent=pad(s);
  cdD.nextElementSibling.textContent=plural(d,'day'); cdH.nextElementSibling.textContent=plural(h,'hour');
  cdM.nextElementSibling.textContent=plural(m,'min'); cdS.nextElementSibling.textContent=plural(s,'sec');
  return false;
}
(function tick(){ const now=Date.now(); const dist=raceDate-now; const done=render(dist); if(done) return; setTimeout(tick, 1000-(now%1000)); })();

/* ===== Assistant ===== */
(() => {
  const $ = s => document.querySelector(s);
  const log = $('#ai-log'), input = $('#ai-input'), send = $('#ai-send');
  const panel = $('#ai-panel'), fab = $('#ai-btn');
  const chips = [...document.querySelectorAll('#ai-chips .chipbtn')];

  function add(kind, text){
    const b=document.createElement('div'); b.className=`msg ${kind}`; b.textContent=text; log.appendChild(b); log.scrollTop=log.scrollHeight;
  }
  add('ai',"Hi! I’m your F1 assistant. Ask about drivers, teams, races, circuits, or records.");

  fab.addEventListener('click', () => { panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex'; panel.style.flexDirection='column'; });
  chips.forEach(c => c.addEventListener('click', () => { input.value = c.dataset.q; send.click(); }));

  async function ask(q){
    const res = await fetch('/api/chat/ask', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: q }) // IMPORTANT: "message", not "question"
    });
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      const data = await res.json();
      return data.answer || data.message || data.text || '';
    } else {
      return await res.text();
    }
  }

  send.addEventListener('click', async () => {
    const q = input.value.trim(); if(!q) return;
    add('user', q); input.value='';
    try {
      const reply = await ask(q);
      add('ai', reply || 'Sorry, no response.');
    } catch(e) {
      add('ai','⚠️ Could not reach server.');
    }
  });
  input.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send.click(); } });
})();
</script>

<!-- ===== Dark/Light theme toggle ===== -->
<script>
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('theme') || 'dark';
  if (saved === 'light') { document.documentElement.setAttribute('data-theme','light'); toggle.textContent='🌙'; }
  toggle.addEventListener('click', () => {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme','dark');
      toggle.textContent='☀️';
    } else {
      document.documentElement.setAttribute('data-theme','light');
      localStorage.setItem('theme','light');
      toggle.textContent='🌙';
    }
  });
</script>

<!-- ===== Auth navbar + hero greeting ===== -->
<script type="module">
  import { Auth, mountNavbar } from "/js/auth.js";
  // mount navbar (uses #welcome, #authLink, #registerLink)
  mountNavbar();
  // set "Welcome <name>" in the hero line if signed in
  const u = Auth.get();
  const hi = document.getElementById("hiUser");
  if (hi) {
    hi.textContent = u ? " " + (u.displayName || u.username || u.email) : "";
  }
</script>
</body>
</html>
