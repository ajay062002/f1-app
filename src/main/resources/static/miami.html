<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Miami Collection • F1Live</title>
<style>
  :root { --bg:#000; --fg:#e7ecef; --muted:#98a2a8; --card:#0c0c0c; --border:#202225; --accent:#e10600; }
  body{margin:0;background:var(--bg);color:var(--fg);font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
  .wrap{max-width:1200px;margin:0 auto;padding:24px 20px}
  header{height:64px;display:flex;align-items:center;border-bottom:1px solid #111;padding:0 20px}
  .brand{font-weight:900;color:#fff;font-size:22px;margin-right:20px}
  nav a{margin-right:18px;color:#cfd7db;text-decoration:none}
  .hero{position:relative;height:320px;border-bottom:1px solid #111;display:flex;align-items:center;justify-content:center;background:#070707}
  .hero::before{content:"";position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1536766820879-059fec98ec0a?w=1800&auto=format') center/cover;opacity:.35}
  .hero h1{position:relative;font-size:44px;margin:0 0 10px}
  .cta{display:flex;gap:12px;position:relative}
  .btn{padding:10px 16px;border:1px solid var(--border);border-radius:999px;background:#0b0b0b;color:#e7ecef}
  .btn.primary{background:#fff;color:#111;border-color:#fff;font-weight:800}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
  svg{background:#0b0b0b;border:1px solid #161616;border-radius:12px}
  @media(max-width:900px){ .grid{grid-template-columns:1fr} .hero{height:auto;padding:40px 0} }
</style>
</head>
<body>
<header>
  <a class="brand" href="/index.html">F1<span style="color:var(--accent)">Live</span></a>
  <nav>
    <a href="/drivers.html">Drivers</a>
    <a href="/teams.html">Teams</a>
    <a href="/standings.html">Standings</a>
    <a href="/circuits.html">Circuits</a>
  </nav>
  <!-- auth controls (right side) -->
  <div style="margin-left:auto;display:flex;gap:16px;align-items:center">
    <span id="welcome" style="color:#cfd7db"></span>
    <a id="authLink" href="/login.html">Login</a>
    <a id="registerLink" href="/register.html">Register</a>
  </div>
</header>

<section class="hero">
  <div class="wrap" style="text-align:center">
    <h1>Miami Collection</h1>
    <p class="muted">Sunset vibes, teal lines, and the marina chicane: a curated set inspired by the Miami GP.</p>
    <div class="cta"><a class="btn primary" href="/circuits.html">View Circuits</a><a class="btn" href="/drivers.html">Meet Drivers</a></div>
  </div>
</section>

<div class="wrap">
  <div class="grid">
    <div class="card">
      <h3 style="margin-top:0">Miami International Autodrome</h3>
      <img id="img" alt="Miami" style="width:100%;height:180px;object-fit:cover;border-radius:12px;margin-bottom:10px">
      <p class="muted" id="loc"></p>
      <p class="muted">Laps: <span id="laps"></span> · Lap length: <span id="laplen"></span> · Race distance: <span id="rdist"></span></p>
      <button id="lapBtn" class="btn" style="margin-top:6px">Start Lap</button>
    </div>
    <div class="card">
      <svg width="100%" height="260" viewBox="0 0 500 260">
        <path id="path" d="M60,210 C120,70 380,70 430,130 C390,170 350,190 300,200 C240,210 180,220 60,210" 
          fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <circle id="car" r="6" cx="60" cy="210" fill="#0af"/>
      </svg>
    </div>
  </div>
</div>

<script>
(async function(){
  const res = await fetch('/api/circuits?q=miami');
  const list = await res.json();
  const c = list[0]; if(!c) return;
  document.getElementById('img').src = c.imageUrl || '';
  document.getElementById('loc').textContent = `${c.city||''}${c.city?', ':''}${c.country||''}`;
  document.getElementById('laps').textContent = c.laps ?? '–';
  document.getElementById('laplen').textContent = c.lapLengthKm ? (c.lapLengthKm.toFixed(3)+' km') : '–';
  document.getElementById('rdist').textContent = c.raceDistanceKm ? (c.raceDistanceKm.toFixed(3)+' km') : '–';
  if(c.svgPath) document.getElementById('path').setAttribute('d', c.svgPath);
})();
document.getElementById('lapBtn').onclick = ()=>{
  const p = document.getElementById('path'), car = document.getElementById('car');
  const len = p.getTotalLength(); const start = performance.now();
  (function step(now){
    const t = Math.min(1,(now-start)/4200);
    const pt = p.getPointAtLength(t*len);
    car.setAttribute('cx', pt.x); car.setAttribute('cy', pt.y);
    if(t<1) requestAnimationFrame(step);
  })(start);
};
</script>

<!-- mount auth navbar -->
<script type="module">
  import { mountNavbar } from "/js/auth.js";
  mountNavbar({ welcomeId: "welcome", authLinkId: "authLink", registerLinkId: "registerLink" });
</script>
</body>
</html>
