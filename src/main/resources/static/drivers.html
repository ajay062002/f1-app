<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>F1 Drivers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Grid only defines gap; columns come from styles.css (.drivers-grid) */
    .grid { display: grid; gap: 20px; }

    /* Card */
    .card {
      border: 1px solid #242429; border-radius: 16px; background: #101114;
      overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: scale(1.03); box-shadow: 0 10px 30px rgba(0,0,0,.35); }

    /* Image wrapper */
    .thumb-wrap { position: relative; height: 300px; overflow: hidden; background: #0c0d11; }
    .thumb-wrap::after{
      content:""; position:absolute; inset:0; pointer-events:none;
      background:
        linear-gradient(0deg, rgba(0,0,0,.06), rgba(0,0,0,.06)),
        repeating-linear-gradient(-35deg, rgba(255,255,255,.03) 0 12px, rgba(255,255,255,0) 12px 24px);
    }
    .thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(.97); display: block; }

    .card-body { padding: 12px }
    .card h3 { margin: 0 0 6px 0 }
    .muted { color: #9aa }

    .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px }
    .chip { background:#0e0f13;border:1px solid #242429;border-radius:999px;padding:4px 8px;font-size:.9rem }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items:center; justify-content:center; z-index: 200; }
    .modal { background:#151517; border-radius:16px; padding:20px; max-width:640px; width:90%; color:white; border:1px solid #242429; }
    .modal img { width:100%; border-radius:12px; margin:12px 0; background:#0f0f12; }
    .close { float:right; cursor:pointer; font-size:1.2rem; }
  </style>
</head>
<body>
<header class="bar">
  <div class="nav-wrap">
    <h1 class="brand">F1 Portal</h1>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a class="active" href="drivers.html">Drivers</a>
      <a href="teams.html">Teams</a>
      <a href="standings.html">Standings</a>
      <a href="circuits.html">Circuits</a>
      <a id="registerLink" href="register.html">Register</a>
      <span id="welcome" style="margin-left:auto;margin-right:12px;"></span>
      <a id="authLink" href="login.html">Login</a>
	  <a id="registerLink" href="/register.html">Register</a>
    </nav>
  </div>
</header>

<main class="container">
  <h2>Drivers</h2>
  <!-- Now locked to 4 cards per row -->
  <div id="grid" class="grid drivers-grid"></div>
</main>

<!-- Modal -->
<div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="mName">
  <div class="modal">
    <span class="close" id="closeBtn" aria-label="Close">&times;</span>
    <h2 id="mName"></h2>
    <p id="mTeam" class="muted" style="margin:4px 0 10px 0"></p>
    <div class="chips" style="margin:0 0 10px 0">
      <span class="chip">No. <span id="mNumber"></span></span>
      <span class="chip" id="mNat"></span>
    </div>
    <img id="mImg" src="" alt="">
  </div>
</div>

<script type="module">
  import { mountNavbar } from "/js/auth.js";
  mountNavbar({ welcomeId: "welcome", authLinkId: "authLink", registerLinkId: "registerLink" });
</script>

<script>
const DRIVERS = [
  {name:"Max Verstappen",  number:1,  nat:"NED", team:"Oracle Red Bull Racing",            img:"max.jpg"},
  {name:"Yuki Tsunoda",    number:22, nat:"JPN", team:"Oracle Red Bull Racing",            img:"yuki.jpg"},
  {name:"Charles Leclerc", number:16, nat:"MON", team:"Scuderia Ferrari HP",               img:"carles.jpg"},
  {name:"Lewis Hamilton",  number:44, nat:"GBR", team:"Scuderia Ferrari HP",               img:"lewis.jpg"},
  {name:"George Russell",  number:63, nat:"GBR", team:"Mercedes-AMG Petronas F1 Team",     img:"george.jpg"},
  {name:"Kimi Antonelli",  number:12, nat:"ITA", team:"Mercedes-AMG Petronas F1 Team",     img:"kimi.jpg"},
  {name:"Lando Norris",    number:4,  nat:"GBR", team:"McLaren F1 Team",                   img:"lando.jpg"},
  {name:"Oscar Piastri",   number:81, nat:"AUS", team:"McLaren F1 Team",                   img:"oscar.jpg"},
  {name:"Lance Stroll",    number:18, nat:"CAN", team:"Aston Martin Aramco Cognizant",     img:"strolll.jpg"},
  {name:"Fernando Alonso", number:14, nat:"ESP", team:"Aston Martin Aramco Cognizant",     img:"alonso.jpg"},
  {name:"Liam Lawson",     number:30, nat:"NZL", team:"Visa Cash App RB",                  img:"liam.jpg"},
  {name:"Isack Hadjar",    number:6,  nat:"FRA", team:"Visa Cash App RB",                  img:"isack.jpg"},
  {name:"Alexander Albon", number:23, nat:"THA", team:"Williams Racing",                   img:"alex.jpg"},
  {name:"Carlos Sainz",    number:55, nat:"ESP", team:"Williams Racing",                   img:"carlos.jpg"},
  {name:"Nico Hülkenberg", number:27, nat:"GER", team:"Stake F1 Team Kick Sauber",         img:"nico.jpg"},
  {name:"Gabriel Bortoleto",number:5, nat:"BRA", team:"Stake F1 Team Kick Sauber",         img:"gabriel.jpg"},
  {name:"Esteban Ocon",    number:31, nat:"FRA", team:"MoneyGram Haas F1 Team",            img:"ocon.jpg"},
  {name:"Oliver Bearman",  number:87, nat:"GBR", team:"MoneyGram Haas F1 Team",            img:"oliver.jpg"},
  {name:"Pierre Gasly",    number:10, nat:"FRA", team:"BWT Alpine F1 Team",                img:"Gasly.jpg"},
  {name:"Franco Colapinto",number:43, nat:"ARG", team:"BWT Alpine F1 Team",                img:"franco.jpg"}
];

const grid = document.getElementById('grid');

function imgFallback(imgEl){
  imgEl.onerror = null;
  imgEl.style.display = 'none';
}

DRIVERS.forEach(d => {
  const card = document.createElement('article');
  card.className = 'card';
  card.innerHTML = `
    <div class="thumb-wrap">
      <img class="thumb" src="img/drivers/${d.img}" alt="${d.name}" onerror="this.onerror=null;this.style.display='none'">
    </div>
    <div class="card-body">
      <h3>${d.name}</h3>
      <div class="muted">${d.team}</div>
      <div class="chips">
        <span class="chip">#${d.number}</span>
        <span class="chip">${d.nat}</span>
      </div>
    </div>
  `;
  card.onclick = () => openModal(d);
  grid.appendChild(card);
});

/* Modal logic */
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('closeBtn');

function openModal(d){
  document.getElementById('mName').textContent = d.name;
  document.getElementById('mTeam').textContent = d.team;
  document.getElementById('mNumber').textContent = d.number;
  document.getElementById('mNat').textContent = d.nat;
  const img = document.getElementById('mImg');
  img.src = "img/drivers/" + d.img;
  img.alt = d.name;
  img.onerror = () => imgFallback(img);
  overlay.style.display = 'flex';
}
function closeModal(){ overlay.style.display = 'none'; }

closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
window.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
