<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>F1 Standings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .tabs{display:flex;gap:10px;margin:14px 0}
    .tab{
      background:#101114;border:1px solid var(--border);color:#e7e7ea;
      padding:8px 12px;border-radius:10px;cursor:pointer
    }
    .tab.active{background:var(--panel-2);border-color:#2c2c31}
    .driver-cell{display:flex;align-items:center;gap:12px}
    .driver-cell img{width:40px;height:40px;border-radius:10px;object-fit:cover;background:#0f0f12}
    .team-chip{display:inline-flex;align-items:center;gap:6px;background:#0f0f12;border:1px solid var(--border);border-radius:999px;padding:4px 8px;font-size:.85rem}
    .muted-small{font-size:.85rem;color:var(--muted)}
  </style>
</head>
<body>
<header class="bar">
  <div class="nav-wrap">
    <h1 class="brand">Aj F1 Live</h1>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="drivers.html">Drivers</a>
      <a href="teams.html">Teams</a>
      <a class="active" href="standings.html">Standings</a>
      <a href="circuits.html">Circuits</a>
      <span id="welcome" style="margin-left:auto;margin-right:12px;"></span>
      <a id="authLink" href="login.html">Login</a>
      <a id="registerLink" href="register.html">Register</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">☀️</button>
    </nav>
  </div>
</header>

<main class="container">
  <h2>Driver standings</h2>

  <!-- Tabs -->
  <div class="tabs">
    <button id="tabDrivers" class="tab active">Drivers</button>
    <button id="tabConstructors" class="tab">Constructors</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input id="q" class="input" placeholder="Search driver or team..." />
    <select id="teamFilter" class="input" style="max-width:280px">
      <option value="">All teams</option>
    </select>
  </div>

  <!-- Table -->
  <table class="table" id="tbl">
    <thead>
      <tr>
        <th style="width:64px">#</th>
        <th>Driver</th>
        <th>Team</th>
        <th style="width:80px">Pts</th>
        <th style="width:80px">Wins</th>
        <th style="width:110px">Podiums</th>
        <th style="width:80px">Poles</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>

<script>
/* ===== Theme toggle ===== */
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') || 'dark';
if (savedTheme === 'light') { document.documentElement.setAttribute('data-theme','light'); themeToggle.textContent='🌙'; }
themeToggle.addEventListener('click', () => {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if (isLight) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('theme','dark'); themeToggle.textContent='☀️'; }
  else { document.documentElement.setAttribute('data-theme','light'); localStorage.setItem('theme','light'); themeToggle.textContent='🌙'; }
});

/* ------------ STATE --------------- */
let DRIVERS = [];
let currentTab = 'drivers';
const tbody = document.getElementById('tbody');
const q = document.getElementById('q');
const teamFilter = document.getElementById('teamFilter');
const tabDrivers = document.getElementById('tabDrivers');
const tabConstructors = document.getElementById('tabConstructors');

/* ------------ LOAD DATA FROM JSON --------------- */
fetch('/data/standings_drivers.json')
  .then(r => r.json())
  .then(data => {
    DRIVERS = data.map(d => ({
      name: d.name,
      number: d.number,
      nat: d.nationality,
      team: d.team_name,
      img: d.driver_id + '.jpg',
      pts: d.pts,
      wins: d.wins,
      podiums: d.podiums,
      poles: d.poles
    }));
    populateTeamFilter();
    switchTo('drivers');
  })
  .catch(() => { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted)">Could not load standings data.</td></tr>'; });

/* ------------ RENDERING --------------- */
function populateTeamFilter(){
  [...new Set(DRIVERS.map(d=>d.team))].sort().forEach(t=>{
    const opt = document.createElement('option'); opt.value=t; opt.textContent=t; teamFilter.appendChild(opt);
  });
}

function renderDrivers(){
  const query = q.value.trim().toLowerCase();
  const teamSel = teamFilter.value;
  const data = DRIVERS
    .filter(d => (!teamSel || d.team===teamSel) &&
      (!query || d.name.toLowerCase().includes(query) || d.team.toLowerCase().includes(query)))
    .sort((a,b)=> b.pts - a.pts);

  document.querySelector('#tbl thead').innerHTML = `<tr>
    <th style="width:64px">#</th><th>Driver</th><th>Team</th>
    <th style="width:80px">Pts</th><th style="width:80px">Wins</th>
    <th style="width:110px">Podiums</th><th style="width:80px">Poles</th>
  </tr>`;

  tbody.innerHTML = '';
  data.forEach((d,idx)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td><div class="driver-cell">
        <img src="images/${d.img}" alt="${d.name}" onerror="this.style.display='none'">
        <div><div><strong>${d.name}</strong></div>
        <div class="muted-small">No. ${d.number} · ${d.nat}</div></div>
      </div></td>
      <td><span class="team-chip">${d.team}</span></td>
      <td><strong>${d.pts}</strong></td>
      <td>${d.wins}</td><td>${d.podiums}</td><td>${d.poles}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderConstructors(){
  const map = new Map();
  DRIVERS.forEach(d=>{
    if(!map.has(d.team)) map.set(d.team,{team:d.team,pts:0,wins:0,podiums:0,poles:0});
    const t=map.get(d.team); t.pts+=d.pts; t.wins+=d.wins; t.podiums+=d.podiums; t.poles+=d.poles;
  });
  const data = [...map.values()].sort((a,b)=>b.pts-a.pts);

  document.querySelector('#tbl thead').innerHTML = `<tr>
    <th style="width:64px">#</th><th>Constructor</th>
    <th style="width:80px">Pts</th><th style="width:80px">Wins</th>
    <th style="width:110px">Podiums</th><th style="width:80px">Poles</th>
  </tr>`;
  tbody.innerHTML = '';
  data.forEach((t,idx)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${idx+1}</td><td><strong>${t.team}</strong></td>
      <td><strong>${t.pts}</strong></td><td>${t.wins}</td><td>${t.podiums}</td><td>${t.poles}</td>`;
    tbody.appendChild(tr);
  });
}

function switchTo(tab){
  currentTab = tab;
  tabDrivers.classList.toggle('active', tab==='drivers');
  tabConstructors.classList.toggle('active', tab==='constructors');
  if(tab==='drivers') renderDrivers();
  else { q.value=''; teamFilter.value=''; renderConstructors(); }
}

q.addEventListener('input', ()=>{ if(currentTab==='drivers') renderDrivers(); });
teamFilter.addEventListener('change', ()=>{ if(currentTab==='drivers') renderDrivers(); });
tabDrivers.addEventListener('click', ()=>switchTo('drivers'));
tabConstructors.addEventListener('click', ()=>switchTo('constructors'));
</script>

<!-- mount auth navbar -->
<script type="module">
  import { mountNavbar } from "/js/auth.js";
  mountNavbar({ welcomeId: "welcome", authLinkId: "authLink", registerLinkId: "registerLink" });
</script>
</body>
</html>
