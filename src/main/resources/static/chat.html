<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F1 Chat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/img/favicon.png">
<style>
  :root{
    --f1-red:#e10600; --bg:#0b0d12; --panel:#121622; --line:#2b2f3a;
    --txt:#f6f7fb; --muted:#a9afba; --chip:#1b2131; --user:#1f5bff; --ai:#1a1f2c;
  }
  body{margin:0;background:radial-gradient(1200px 700px at 20% -10%, #17202f 0%, #0b0d12 55%), #0b0d12;color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif}
  header{padding:18px 18px 6px;border-bottom:1px solid #1b2030;background:linear-gradient(180deg,#12182a,#101524)}
  .brand{margin:0;font-size:18px;font-weight:900;letter-spacing:.4px}
  .wrap{max-width:860px;margin:20px auto;padding:0 14px}
  /* widget (same as floating version, just opened by default) */
  #ai-wrap{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#0e1320;box-shadow:0 18px 40px rgba(0,0,0,.45)}
  #ai-head{background:linear-gradient(180deg,#1c2130,#171a25);border-bottom:1px solid var(--line);padding:10px 12px;display:flex;align-items:center;gap:10px}
  #ai-head .led{width:10px;height:10px;border-radius:50%;background:var(--f1-red)}
  #ai-title{font-weight:900}
  #ai-tip{margin-left:auto;font-size:12px;color:var(--muted)}
  #ai-chips{padding:10px;display:flex;gap:8px;flex-wrap:wrap;background:#111727;border-bottom:1px solid var(--line)}
  .chip{background:var(--chip);color:#d7dce6;border:1px solid var(--line);padding:6px 10px;border-radius:999px;font-size:12px;cursor:pointer}
  .chip:hover{background:#20283a}
  #ai-log{background:var(--bg);min-height:420px;max-height:60vh;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:82%;padding:10px 12px;border-radius:12px;line-height:1.35;font-size:14px;white-space:pre-wrap}
  .msg.ai{background:var(--ai);border:1px solid var(--line);align-self:flex-start}
  .msg.user{background:var(--user);color:#fff;align-self:flex-end}
  .typing{display:flex;gap:6px;align-items:center}
  .dot{width:6px;height:6px;border-radius:50%;background:#cbd2dd;opacity:.5;animation:bounce 1.2s infinite}
  .dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}
  #ai-bar{display:flex;gap:8px;padding:10px;background:#101627;border-top:1px solid var(--line)}
  #ai-input{flex:1;resize:none;height:54px;max-height:200px;padding:12px;border-radius:12px;border:1px solid var(--line);background:#0e1220;color:var(--txt)}
  #ai-send{background:var(--f1-red);color:#fff;border:none;border-radius:12px;padding:0 18px;font-weight:900;cursor:pointer}
  #ai-foot{padding:8px 10px;text-align:center;font-size:12px;color:var(--muted);background:#0d1220}
</style>
</head>
<body>
<header><h1 class="brand">F1 Assistant</h1></header>
<div class="wrap">
  <div id="ai-wrap" aria-label="F1 Assistant">
    <div id="ai-head">
      <span class="led"></span><span id="ai-title">F1 Assistant</span>
      <span id="ai-tip">Shift+Enter = newline</span>
    </div>
    <div id="ai-chips">
      <button class="chip" data-q="Top drivers right now">Top drivers</button>
      <button class="chip" data-q="Current constructors standings top 5">Constructors top 5</button>
      <button class="chip" data-q="When is the next race and where?">Next race</button>
      <button class="chip" data-q="Ferrari stats">Ferrari stats</button>
      <button class="chip" data-q="Stats for Charles Leclerc">Charles Leclerc</button>
    </div>
    <div id="ai-log"></div>
    <div id="ai-bar">
      <textarea id="ai-input" placeholder="Ask anything about F1 (drivers, teams, races, circuits, records)…"></textarea>
      <button id="ai-send">Send</button>
    </div>
    <div id="ai-foot">Powered by your backend • <code>/api/chat/ask</code></div>
  </div>
</div>

<script>
(() => {
  const $ = s => document.querySelector(s);
  const log = $('#ai-log'), input = $('#ai-input'), send = $('#ai-send');
  const chips = [...document.querySelectorAll('#ai-chips .chip')];

  chips.forEach(c => c.addEventListener('click', () => { input.value = c.dataset.q; send.click(); }));

  function add(kind, text){
    const b = document.createElement('div'); b.className = `msg ${kind}`; b.textContent = text;
    log.appendChild(b); log.scrollTop = log.scrollHeight; return b;
  }
  function typing(on){
    if(on){
      const row = document.createElement('div'); row.className='typing'; row.id='typing';
      row.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      log.appendChild(row); log.scrollTop = log.scrollHeight;
    } else { const t = document.getElementById('typing'); if(t) t.remove(); }
  }

  add('ai',"Hi! I’m your F1 assistant. Ask about drivers, teams, races, standings, circuits, or records.");

  send.addEventListener('click', async () => {
    const q = input.value.trim(); if(!q) return;
    add('user', q); input.value=''; typing(true);
    try{
      const r = await fetch('/api/chat/ask', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message: q })
      });
      const data = await r.json().catch(()=> ({}));
      typing(false);
      add('ai', data.answer || 'Sorry, I could not generate a response.');
    }catch(e){
      typing(false); add('ai','⚠️ Error reaching the server.');
    }
  });

  input.addEventListener('keydown', e => {
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send.click(); }
  });
})();
</script>
</body>
</html>
